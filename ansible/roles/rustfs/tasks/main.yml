---
- name: Load appliance configuration
  ansible.builtin.include_vars:
    file: "{{ kdx_config_path }}"
    name: kdx_config

- name: Select NAR Object Storage bind IP
  ansible.builtin.set_fact:
    rustfs_bind_ip: >-
      {{
        kdx_config.network.data.ip
        if kdx_config.network.data.mode == 'separate' and (kdx_config.network.data.ip | default('') | length > 0)
        else kdx_config.network.management.ip
      }}

- name: Check storage plan
  ansible.builtin.stat:
    path: /var/lib/kronosdx/storage-plan.yml
  register: rustfs_storage_plan_file

- name: Load storage plan
  ansible.builtin.include_vars:
    file: /var/lib/kronosdx/storage-plan.yml
    name: rustfs_storage_plan
  when: rustfs_storage_plan_file.stat.exists

- name: Select NAR Object Storage data directories
  ansible.builtin.set_fact:
    rustfs_data_dirs: "{{ rustfs_storage_plan.storage | map(attribute='mount') | map('regex_replace', '$', '/rustfs') | list if rustfs_storage_plan_file.stat.exists and (rustfs_storage_plan.storage | default([]) | length > 0) else ['/var/lib/kronosdx/rustfs-single/rustfs'] }}"

- name: Ensure NAR Object Storage data directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "10001"
    group: "10001"
    mode: "0750"
  loop: "{{ rustfs_data_dirs }}"
  loop_control:
    label: "{{ item }}"

- name: Initialize NAR Object Storage container volume arguments
  ansible.builtin.set_fact:
    rustfs_podman_volume_mounts: []
    rustfs_backend_volume_args: []

- name: Build NAR Object Storage container volume arguments
  ansible.builtin.set_fact:
    rustfs_podman_volume_mounts: "{{ rustfs_podman_volume_mounts + ['-v ' ~ item ~ ':' ~ container_path ~ ':Z'] }}"
    rustfs_backend_volume_args: "{{ rustfs_backend_volume_args + [container_path] }}"
  vars:
    container_path: "/data/disk{{ '%02d' | format(ansible_loop.index | int) }}"
  loop: "{{ rustfs_data_dirs }}"
  loop_control:
    extended: true
    label: "{{ item }}"

- name: Ensure NAR Object Storage secret directory exists
  ansible.builtin.file:
    path: "{{ rustfs_env_file | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Check NAR Object Storage credential file
  ansible.builtin.stat:
    path: "{{ rustfs_env_file }}"
  register: rustfs_env_stat

- name: Check legacy backend credential file
  ansible.builtin.stat:
    path: /etc/kronosdx/secrets/rustfs.env
  register: rustfs_legacy_env_stat
  when: not rustfs_env_stat.stat.exists

- name: Migrate legacy backend credential file
  ansible.builtin.copy:
    src: /etc/kronosdx/secrets/rustfs.env
    dest: "{{ rustfs_env_file }}"
    remote_src: true
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when:
    - not rustfs_env_stat.stat.exists
    - rustfs_legacy_env_stat.stat.exists

- name: Refresh NAR Object Storage credential file status
  ansible.builtin.stat:
    path: "{{ rustfs_env_file }}"
  register: rustfs_env_stat

- name: Generate NAR Object Storage secret key
  ansible.builtin.command:
    cmd: openssl rand -hex 24
  changed_when: false
  register: rustfs_secret_key
  no_log: true
  when: not rustfs_env_stat.stat.exists

- name: Write NAR Object Storage credential file
  ansible.builtin.copy:
    dest: "{{ rustfs_env_file }}"
    owner: root
    group: root
    mode: "0600"
    content: |
      RUSTFS_ACCESS_KEY=nosadmin
      RUSTFS_SECRET_KEY={{ rustfs_secret_key.stdout }}
      RUSTFS_CONSOLE_ENABLE=true
      RUST_LOG=error
  no_log: true
  when: not rustfs_env_stat.stat.exists

- name: Pull NAR Object Storage backend image
  ansible.builtin.command:
    cmd: podman pull "{{ rustfs_image }}"
  register: rustfs_image_pull
  changed_when: "'Downloaded newer image' in rustfs_image_pull.stdout or 'Copying blob' in rustfs_image_pull.stdout"
  when: rustfs_pull_image | bool

- name: Install NAR Object Storage systemd unit
  ansible.builtin.template:
    src: rustfs.service.j2
    dest: /etc/systemd/system/rustfs.service
    owner: root
    group: root
    mode: "0644"
  register: rustfs_unit

- name: Reload systemd after NAR Object Storage unit changes
  ansible.builtin.systemd:
    daemon_reload: true
  when: rustfs_unit.changed

- name: Enable and start NAR Object Storage service
  ansible.builtin.systemd:
    name: rustfs.service
    enabled: true
    state: "{{ 'restarted' if rustfs_unit.changed else 'started' }}"
  when: rustfs_start | bool

- name: Report NAR Object Storage deployment
  ansible.builtin.debug:
    msg:
      - "NAR Object Storage image: {{ rustfs_image }}"
      - "NAR Object Storage data dirs: {{ rustfs_data_dirs | join(', ') }}"
      - "NAR Object Storage API: http://{{ rustfs_bind_ip }}:{{ rustfs_api_port }}"
      - "NAR Object Storage console: http://{{ rustfs_bind_ip }}:{{ rustfs_console_port }}"
      - "NAR Object Storage credentials file: {{ rustfs_env_file }}"
